<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>本地 RAG 多轮对话</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 900px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .top-link {
            display: inline-block;
            margin-bottom: 16px;
            color: #1677ff;
            text-decoration: none;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #ddd;
            resize: none;
        }

        button {
            margin-top: 12px;
            padding: 8px 16px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            background: #1677ff;
            color: white;
            cursor: pointer;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .rewrite {
            margin-top: 12px;
            color: #666;
            font-size: 14px;
            background: #f6f8fa;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .answer {
            margin-top: 20px;
            padding: 16px;
            min-height: 140px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            line-height: 1.8;
        }

        .sources {
            margin-top: 20px;
            padding: 12px;
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }

        .source-item {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border: 1px solid #f0e1a0;
            border-radius: 8px;
        }

        .ref-link {
            color: #1677ff;
            cursor: pointer;
            font-weight: bold;
        }

        mark {
            background: #ffe58f;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

<div class="container">
    <a class="top-link" href="./file-manager.html">文件管理</a>

    <h2>本地 RAG 多轮对话</h2>

    <textarea id="question" placeholder="请输入问题，例如：毛泽东思想是什么？">毛泽东思想是什么</textarea>

    <br>
    <button id="askBtn" onclick="ask()">开始提问</button>

    <div id="rewriteQuestion" class="rewrite"></div>

    <div id="answer" class="answer"></div>

    <div id="sources" class="sources" style="display:none;">
        <strong>引用来源：</strong>
        <div id="sourceList"></div>
    </div>
</div>

<script>
    let eventSource = null;

    const sessionId = "user-" + Math.random().toString(36).substring(2);

    function ask() {
        const question = document.getElementById("question").value.trim();
        const answerEl = document.getElementById("answer");
        const sourcesEl = document.getElementById("sources");
        const sourceListEl = document.getElementById("sourceList");
        const askBtn = document.getElementById("askBtn");
        const rewriteEl = document.getElementById("rewriteQuestion");

        if (!question) {
            alert("请输入问题");
            return;
        }

        if (eventSource) {
            eventSource.close();
        }

        const keywords = extractKeywords(question);

        answerEl.innerHTML = "";
        sourceListEl.innerHTML = "";
        sourcesEl.style.display = "none";
        rewriteEl.style.display = "none";
        rewriteEl.innerText = "";

        askBtn.disabled = true;
        askBtn.textContent = "回答中...";

        const url = "http://localhost:8080/rag/stream/ask"
            + "?question=" + encodeURIComponent(question)
            + "&sessionId=" + encodeURIComponent(sessionId);

        eventSource = new EventSource(url);

        eventSource.addEventListener("rewrite", function (event) {
            rewriteEl.style.display = "block";
            rewriteEl.innerText = "检索问题：" + event.data;
        });

        eventSource.addEventListener("message", function (event) {
            let text = escapeHtml(event.data);

            text = highlight(text, keywords);

            text = text.replace(/\[(\d+)]/g, function (match, num) {
                return `<span class="ref-link" onclick="scrollToSource(${num})">[${num}]</span>`;
            });

            answerEl.innerHTML += text;
        });

        eventSource.addEventListener("sources", function (event) {
            sourcesEl.style.display = "block";

            try {
                const sources = JSON.parse(event.data);

                sourceListEl.innerHTML = sources.map(item => {
                    const fileName = escapeHtml(item.fileName || "未知文件");
                    const content = highlight(escapeHtml(item.content || ""), keywords);

                    return `
                        <div id="source-${item.ref}" class="source-item">
                            <b>[${item.ref}] ${fileName}</b>
                            <div>${content}</div>
                        </div>
                    `;
                }).join("");

            } catch (e) {
                sourceListEl.innerHTML = `<div class="source-item">${escapeHtml(event.data)}</div>`;
            }
        });

        eventSource.addEventListener("done", function () {
            askBtn.disabled = false;
            askBtn.textContent = "开始提问";

            if (eventSource) {
                eventSource.close();
            }
        });

        eventSource.addEventListener("error", function () {
            askBtn.disabled = false;
            askBtn.textContent = "开始提问";

            if (eventSource) {
                eventSource.close();
            }

            if (!answerEl.innerHTML) {
                answerEl.textContent = "请求失败，请检查后端服务是否启动。";
            }
        });
    }

    function scrollToSource(ref) {
        const el = document.getElementById("source-" + ref);
        if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "center" });
            el.style.outline = "2px solid #1677ff";

            setTimeout(() => {
                el.style.outline = "none";
            }, 1500);
        }
    }

    function extractKeywords(question) {
        return question
            .replace(/[？?。,.，、！!]/g, " ")
            .split(/\s+/)
            .filter(word => word.length >= 2);
    }

    function highlight(text, keywords) {
        if (!keywords || keywords.length === 0) {
            return text;
        }

        let result = text;

        keywords.forEach(keyword => {
            const safeKeyword = escapeRegExp(keyword);
            const reg = new RegExp("(" + safeKeyword + ")", "gi");
            result = result.replace(reg, "<mark>$1</mark>");
        });

        return result;
    }

    function escapeRegExp(text) {
        return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>

</body>
</html>
