<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>本地 RAG 流式问答</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #ddd;
            resize: none;
        }

        button {
            margin-top: 12px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #1677ff;
            color: white;
            cursor: pointer;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .answer {
            margin-top: 24px;
            padding: 16px;
            min-height: 160px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            line-height: 1.8;
        }

        .sources {
            margin-top: 20px;
            padding: 12px;
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }

        .source-item {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>本地 RAG 流式问答</h2>

    <textarea id="question" placeholder="请输入问题，例如：毛泽东思想是什么？">毛泽东思想是什么</textarea>

    <br />

    <button id="askBtn" onclick="ask()">开始提问</button>

    <div class="answer" id="answer"></div>

    <div class="sources" id="sources" style="display:none;">
        <strong>引用来源：</strong>
        <div id="sourceList"></div>
    </div>
</div>

<script>
    let eventSource = null;

    function ask() {
        const question = document.getElementById("question").value.trim();
        const answerEl = document.getElementById("answer");
        const sourcesEl = document.getElementById("sources");
        const sourceListEl = document.getElementById("sourceList");
        const askBtn = document.getElementById("askBtn");

        if (!question) {
            alert("请输入问题");
            return;
        }

        if (eventSource) {
            eventSource.close();
        }

        answerEl.textContent = "";
        sourceListEl.innerHTML = "";
        sourcesEl.style.display = "none";
        askBtn.disabled = true;
        askBtn.textContent = "回答中...";

        const url = "http://localhost:8080/rag/stream/ask?question=" + encodeURIComponent(question);

        eventSource = new EventSource(url);

        eventSource.addEventListener("message", function (event) {
            console.log("收到 token：", event.data);
            answerEl.textContent += event.data;
        });

        eventSource.addEventListener("sources", function (event) {
            sourcesEl.style.display = "block";

            try {
                const sources = JSON.parse(event.data);

                sourceListEl.innerHTML = sources.map(item => {
                    return `<div class="source-item">📄 ${escapeHtml(item)}</div>`;
                }).join("");

            } catch (e) {
                sourceListEl.innerHTML = `<div class="source-item">${escapeHtml(event.data)}</div>`;
            }
        });

        eventSource.addEventListener("done", function () {
            askBtn.disabled = false;
            askBtn.textContent = "开始提问";
            eventSource.close();
        });

        eventSource.addEventListener("error", function (event) {
            askBtn.disabled = false;
            askBtn.textContent = "开始提问";

            if (eventSource) {
                eventSource.close();
            }

            if (!answerEl.textContent) {
                answerEl.textContent = "请求失败，请检查后端服务是否启动。";
            }
        });
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>

</body>
</html>
