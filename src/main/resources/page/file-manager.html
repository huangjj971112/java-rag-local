<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>知识库文件管理</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 900px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
    }

    .section {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fafafa;
    }

    button {
      margin-top: 12px;
      padding: 8px 16px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #1677ff;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .danger-btn {
      background: #ff4d4f;
    }

    .file-item {
      margin-top: 10px;
      padding: 12px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .file-hash {
      font-size: 12px;
      color: #666;
      word-break: break-all;
      margin-top: 6px;
    }

    .status {
      margin-top: 8px;
      color: #666;
      font-size: 14px;
    }

    input[type="file"],
    input[type="text"] {
      margin-top: 8px;
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .pagination {
      margin-top: 16px;
    }

    .pagination button {
      margin-right: 8px;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #1677ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">
  <a class="top-link" href="./stream-chat.html">← 返回问答页面</a>

  <h2>知识库文件管理</h2>

  <div class="section">
    <h3>上传文档</h3>

    <input type="file" id="fileInput" accept=".docx,.pdf,.txt">
    <br>
    <button id="uploadBtn" onclick="upload()">上传入库</button>

    <div id="uploadResult" class="status"></div>
  </div>

  <div class="section">
    <h3>按 fileHash 删除</h3>

    <input id="deleteFileHashInput" type="text" placeholder="请输入 fileHash">
    <button class="danger-btn" onclick="deleteFileByInput()">按 fileHash 删除</button>
  </div>

  <div class="section">
    <h3>已入库文件</h3>

    <button onclick="loadUploadedFiles()">刷新列表</button>

    <div id="uploadedFileList">
      <p class="status">加载中...</p>
    </div>

    <div class="pagination">
      <button onclick="prevPage()">上一页</button>
      <button onclick="nextPage()">下一页</button>
      <span id="pageInfo" class="status"></span>
    </div>
  </div>
</div>

<script>
  let uploadedFiles = [];
  let pageNum = 1;
  let pageSize = 10;
  let total = 0;

  window.addEventListener("DOMContentLoaded", function () {
    loadUploadedFiles();
  });

  function upload() {
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const resultEl = document.getElementById("uploadResult");

    if (!fileInput.files.length) {
      alert("请选择文件");
      return;
    }

    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append("file", file);

    uploadBtn.disabled = true;
    uploadBtn.textContent = "上传中...";
    resultEl.innerText = "正在上传并入库，请稍等...";

    fetch("http://localhost:8080/ingest/upload", {
      method: "POST",
      body: formData
    })
            .then(async res => {
              if (!res.ok) {
                const text = await res.text();
                throw new Error(text || ("HTTP " + res.status));
              }
              return res.json();
            })
            .then(data => {
              if (data.success) {
                resultEl.innerText =
                        "上传成功：" + data.fileName +
                        "，chunks=" + data.chunks;

                pageNum = 1;
                loadUploadedFiles();
              } else {
                resultEl.innerText = data.message || "文件已存在，未重复入库";
              }

              fileInput.value = "";
            })
            .catch(err => {
              resultEl.innerText = "上传失败：" + err.message;
            })
            .finally(() => {
              uploadBtn.disabled = false;
              uploadBtn.textContent = "上传入库";
            });
  }

  function loadUploadedFiles() {
    fetch("http://localhost:8080/ingest/files?pageNum=" + pageNum + "&pageSize=" + pageSize)
            .then(async res => {
              if (!res.ok) {
                const text = await res.text();
                throw new Error(text || ("HTTP " + res.status));
              }
              return res.json();
            })
            .then(data => {
              console.log("文件列表返回：", data);

              // 兼容两种返回：
              // 1. 分页对象：{ total, pageNum, pageSize, records: [...] }
              // 2. 普通数组：[...]
              if (Array.isArray(data)) {
                uploadedFiles = data;
                total = data.length;
              } else {
                uploadedFiles = data.records || [];
                total = data.total || 0;
                pageNum = data.pageNum || pageNum;
                pageSize = data.pageSize || pageSize;
              }

              console.log("uploadedFiles：", uploadedFiles);

              renderUploadedFiles();
              renderPageInfo();
            })
            .catch(err => {
              document.getElementById("uploadedFileList").innerHTML =
                      `<p class="status">加载失败：${escapeHtml(err.message)}</p>`;
            });
  }

  function renderUploadedFiles() {
    const listEl = document.getElementById("uploadedFileList");

    if (!uploadedFiles.length) {
      listEl.innerHTML = `<p class="status">暂无入库文件</p>`;
      return;
    }

    listEl.innerHTML = uploadedFiles.map(item => `
            <div class="file-item">
                <b>${escapeHtml(item.fileName || "未知文件")}</b>
                <div>chunks：${item.chunks ?? 0}</div>
                <div class="file-hash">fileHash：${escapeHtml(item.fileHash || "")}</div>
                <button class="danger-btn" onclick="deleteFile('${escapeJs(item.fileHash || "")}')">删除文件</button>
            </div>
        `).join("");
  }

  function renderPageInfo() {
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    document.getElementById("pageInfo").innerText =
            `第 ${pageNum} / ${totalPages} 页，共 ${total} 个文件`;
  }

  function prevPage() {
    if (pageNum <= 1) {
      return;
    }

    pageNum--;
    loadUploadedFiles();
  }

  function nextPage() {
    const totalPages = Math.max(1, Math.ceil(total / pageSize));

    if (pageNum >= totalPages) {
      return;
    }

    pageNum++;
    loadUploadedFiles();
  }

  function deleteFileByInput() {
    const input = document.getElementById("deleteFileHashInput");
    const fileHash = input.value.trim();

    if (!fileHash) {
      alert("请输入 fileHash");
      return;
    }

    deleteFile(fileHash);
  }

  function deleteFile(fileHash) {
    if (!fileHash) {
      alert("fileHash 为空，无法删除");
      return;
    }

    if (!confirm("确定删除这个文件的向量数据吗？")) {
      return;
    }

    fetch("http://localhost:8080/ingest/deleteFile?fileHash=" + encodeURIComponent(fileHash), {
      method: "POST"
    })
            .then(async res => {
              if (!res.ok) {
                const text = await res.text();
                throw new Error(text || ("HTTP " + res.status));
              }
              return res.json();
            })
            .then(data => {
              if (data.success) {
                alert("删除成功，删除 chunks：" + data.deletedRows);
              } else {
                alert(data.message || "文件不存在或已删除");
              }

              loadUploadedFiles();
            })
            .catch(err => {
              alert("删除失败：" + err.message);
            });
  }

  function escapeHtml(text) {
    return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
  }

  function escapeJs(text) {
    return String(text)
            .replaceAll("\\", "\\\\")
            .replaceAll("'", "\\'")
            .replaceAll('"', '\\"');
  }
</script>

</body>
</html>
